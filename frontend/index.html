<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <!-- Page background lives here too so it still paints if the hashed CSS bundle 404s on deploy. -->
    <style>
      html {
        min-height: 100%;
        min-height: 100dvh;
        background-color: #e8eef9;
        background-image: radial-gradient(
            ellipse 120% 70% at 50% -25%,
            rgba(99, 102, 241, 0.22),
            transparent 55%
          ),
          linear-gradient(
            155deg,
            #dbeafe 0%,
            #eef2ff 38%,
            #e0f2fe 72%,
            #f0f9ff 100%
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 39px,
            rgba(15, 23, 42, 0.045) 39px,
            rgba(15, 23, 42, 0.045) 40px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 39px,
            rgba(15, 23, 42, 0.045) 39px,
            rgba(15, 23, 42, 0.045) 40px
          );
        background-size: auto, auto, 40px 40px, 40px 40px;
      }
      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: transparent;
      }
      #root {
        min-height: 100%;
        min-height: 100dvh;
      }
      @media (prefers-color-scheme: dark) {
        html {
          background-color: #050a12;
          background-image: radial-gradient(
              ellipse 100% 60% at 50% -15%,
              rgba(56, 189, 248, 0.18),
              transparent 50%
            ),
            linear-gradient(
              165deg,
              #020617 0%,
              #0f172a 35%,
              #111c3a 70%,
              #0c1929 100%
            ),
            repeating-linear-gradient(
              0deg,
              transparent,
              transparent 39px,
              rgba(148, 163, 184, 0.06) 39px,
              rgba(148, 163, 184, 0.06) 40px
            ),
            repeating-linear-gradient(
              90deg,
              transparent,
              transparent 39px,
              rgba(148, 163, 184, 0.06) 39px,
              rgba(148, 163, 184, 0.06) 40px
            );
          background-size: auto, auto, 40px 40px, 40px 40px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
